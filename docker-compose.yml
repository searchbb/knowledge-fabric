services:
  knowledge-fabric:
    # 默认本地 build，避免依赖尚未发布的远程镜像。
    # CI 发布 GHCR 镜像后，可注释掉 build 并启用下面的 image 行。
    build:
      context: .
    # image: ghcr.io/searchbb/knowledge-fabric:latest
    container_name: knowledge-fabric
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/data:/app/backend/data
